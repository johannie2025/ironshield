name: Build Unified Installer

on:
  push:
    tags: ["setup-v*"]
  workflow_dispatch:
    inputs:
      agent_tag:
        description: "Tag de release agent à embarquer (ex: agent-v0.1.0)"
        required: true
      gui_tag:
        description: "Tag de release GUI à embarquer (ex: gui-v0.1.0)"
        required: true

jobs:
  build-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.Util.wixext

      - name: Download agent release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.agent_tag || 'agent-latest' }}
        run: |
          mkdir dl-agent
          gh release download "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --dir dl-agent --pattern "*.exe" --pattern "SHA256SUMS.txt" --pattern "VERSION"

      - name: Download GUI release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.gui_tag || 'gui-latest' }}
        run: |
          mkdir dl-gui
          gh release download "$env:TAG" --repo "$env:GITHUB_REPOSITORY" --dir dl-gui --pattern "*.msi"

      - name: Extract GUI exe from MSI
        shell: powershell
        run: |
          $msi = Get-ChildItem dl-gui\*.msi | Select-Object -First 1
          msiexec /a "$($msi.FullName)" /qn TARGETDIR="${PWD}\dl-gui-extracted"
          Copy-Item "dl-gui-extracted\**\ironshield-gui.exe" "dl-gui\ironshield-gui.exe" -Recurse -Force

      - name: Build unified MSI
        shell: powershell
        run: |
          wix build installer/src/Product.wxs `
            -ext WixToolset.Util.wixext `
            -d ProductVersion="${{ github.event.inputs.agent_tag && github.event.inputs.agent_tag.Replace('agent-v','') || '0.1.0' }}" `
            -d AgentExePath="dl-agent\ironshield-agent.exe" `
            -d UpdaterExePath="dl-agent\ironshield-updater.exe" `
            -d Sha256SumsPath="dl-agent\SHA256SUMS.txt" `
            -d VersionPath="dl-agent\VERSION" `
            -d GuiExePath="dl-gui\ironshield-gui.exe" `
            -o IronShieldFIM-Setup.msi

      - name: Upload unified installer
        uses: actions/upload-artifact@v4
        with:
          name: IronShieldFIM-Setup
          path: IronShieldFIM-Setup.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/setup-v')
        uses: softprops/action-gh-release@v2
        with:
          files: IronShieldFIM-Setup.msi
