name: Build Agent + Updater (Windows)

on:
  push:
    branches: [main]
    tags: ["agent-v*"]
    paths:
      - "agent/**"
      - "updater/**"
      - "shared/**"
      - "Cargo.toml"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-agent-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-agent-

      - name: Check formatting
        run: cargo fmt --check --package ironshield-agent --package ironshield-updater --package shared

      - name: Clippy
        run: cargo clippy --package ironshield-agent --package ironshield-updater --package shared --release --target x86_64-pc-windows-msvc -- -D warnings

      - name: Test
        run: cargo test --package ironshield-agent --package ironshield-updater --package shared --release --target x86_64-pc-windows-msvc

      - name: Build release binaries
        run: |
          cargo build --package ironshield-agent --release --target x86_64-pc-windows-msvc
          cargo build --package ironshield-updater --release --target x86_64-pc-windows-msvc

      - name: Generate checksums and VERSION
        shell: bash
        run: |
          cd target/x86_64-pc-windows-msvc/release
          mkdir -p signatures
          cp -r "${GITHUB_WORKSPACE}/agent/signatures-sample/"* signatures/
          sha256sum ironshield-agent.exe ironshield-updater.exe > SHA256SUMS.txt
          echo "${GITHUB_REF_NAME:-agent-v0.0.0-dev}" > VERSION
          cat SHA256SUMS.txt

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ironshield-agent-windows-x64
          path: |
            target/x86_64-pc-windows-msvc/release/ironshield-agent.exe
            target/x86_64-pc-windows-msvc/release/ironshield-updater.exe
            target/x86_64-pc-windows-msvc/release/SHA256SUMS.txt
            target/x86_64-pc-windows-msvc/release/VERSION
            target/x86_64-pc-windows-msvc/release/signatures/**
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/agent-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ironshield-agent-windows-x64
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ironshield-agent.exe
            ironshield-updater.exe
            SHA256SUMS.txt
            VERSION
