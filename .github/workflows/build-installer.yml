name: Build Unified Installer

on:
  push:
    tags: ["setup-v*"]
  workflow_dispatch:
    inputs:
      agent_tag:
        description: "Tag de release agent à embarquer (ex: agent-v0.1.0)"
        required: true
      gui_tag:
        description: "Tag de release GUI à embarquer (ex: gui-v0.1.0)"
        required: true

jobs:
  build-installer:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add WixToolset.Util.wixext/5.0.2

      - name: Resolve version and tags
        id: vars
        shell: pwsh
        run: |
          $agentTag = "${{ github.event.inputs.agent_tag }}"
          if ([string]::IsNullOrEmpty($agentTag)) { $agentTag = "agent-latest" }
          $guiTag = "${{ github.event.inputs.gui_tag }}"
          if ([string]::IsNullOrEmpty($guiTag)) { $guiTag = "gui-latest" }

          $version = $agentTag -replace '^agent-v', ''
          if ([string]::IsNullOrEmpty($version) -or $version -eq $agentTag) { $version = "0.1.0" }

          "agent_tag=$agentTag" >> $env:GITHUB_OUTPUT
          "gui_tag=$guiTag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download agent release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir dl-agent
          gh release download "${{ steps.vars.outputs.agent_tag }}" --repo "$env:GITHUB_REPOSITORY" --dir dl-agent --pattern "*.exe" --pattern "SHA256SUMS.txt" --pattern "VERSION"

      - name: Download GUI release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir dl-gui
          gh release download "${{ steps.vars.outputs.gui_tag }}" --repo "$env:GITHUB_REPOSITORY" --dir dl-gui --pattern "*.msi"

      - name: Extract GUI exe from MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem dl-gui\*.msi | Select-Object -First 1
          if (-not $msi) {
            Write-Error "Aucun fichier .msi trouvé dans dl-gui\"
            exit 1
          }

          $extractDir = Join-Path (Get-Location) "dl-gui-extracted"
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null

          # msiexec.exe rend la main immédiatement (il délègue à un service
          # Windows Installer) : sans -Wait, les étapes suivantes s'exécutent
          # avant que l'extraction ne soit terminée. C'était la cause du bug.
          $process = Start-Process -FilePath "msiexec.exe" `
            -ArgumentList "/a", "`"$($msi.FullName)`"", "/qn", "TARGETDIR=`"$extractDir`"" `
            -Wait -PassThru -NoNewWindow

          if ($process.ExitCode -ne 0) {
            Write-Error "msiexec a échoué avec le code $($process.ExitCode)"
            exit 1
          }

          $exePath = Get-ChildItem -Path $extractDir -Filter "ironshield-gui.exe" -Recurse | Select-Object -First 1
          if (-not $exePath) {
            Write-Error "ironshield-gui.exe introuvable après extraction du MSI"
            Get-ChildItem -Path $extractDir -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Copy-Item $exePath.FullName "dl-gui\ironshield-gui.exe" -Force
          Write-Host "GUI exe extrait avec succès: $($exePath.FullName)"

      - name: Build unified MSI
        shell: pwsh
        run: |
          wix build installer/src/Product.wxs `
            -ext WixToolset.Util.wixext `
            -d ProductVersion="${{ steps.vars.outputs.version }}" `
            -d AgentExePath="dl-agent\ironshield-agent.exe" `
            -d UpdaterExePath="dl-agent\ironshield-updater.exe" `
            -d Sha256SumsPath="dl-agent\SHA256SUMS.txt" `
            -d VersionPath="dl-agent\VERSION" `
            -d GuiExePath="dl-gui\ironshield-gui.exe" `
            -d RegisterTasksScriptPath="installer\src\register-tasks.cmd" `
            -d UnregisterTasksScriptPath="installer\src\unregister-tasks.cmd" `
            -o IronShieldFIM-Setup.msi

      - name: Upload unified installer
        uses: actions/upload-artifact@v4
        with:
          name: IronShieldFIM-Setup
          path: IronShieldFIM-Setup.msi
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/setup-v')
        uses: softprops/action-gh-release@v2
        with:
          files: IronShieldFIM-Setup.msi