name: Build GUI (Tauri)

on:
  push:
    branches: [main]
    tags: ["gui-v*"]
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo (tauri)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tauri-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tauri-

      - name: Install frontend dependencies
        run: npm install

      - name: Type check (non-bloquant pour ce premier passage)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Tauri app (.msi)
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ironshield-gui-installer
          path: target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload raw GUI exe (for unified installer)
        uses: actions/upload-artifact@v4
        with:
          name: ironshield-gui-exe
          path: target/release/ironshield-gui.exe
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/gui-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ironshield-gui-installer
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.msi"
